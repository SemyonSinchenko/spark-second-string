name: Scala CI
on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - spark-version: 3.5.8
            java-version: 11
          - spark-version: 3.5.8
            java-version: 17
          - spark-version: 4.0.2
            java-version: 17
          - spark-version: 4.1.0
            java-version: 17

    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: -Xms2048M -Xmx2048M -Xss6M -XX:ReservedCodeCacheSize=256M -XX:+CMSClassUnloadingEnabled -XX:+UseConcMarkSweepGC -Dfile.encoding=UTF-8
      JVM_OPTS:  -Xms2048M -Xmx2048M -Xss6M -XX:ReservedCodeCacheSize=256M -XX:+CMSClassUnloadingEnabled -XX:+UseConcMarkSweepGC -Dfile.encoding=UTF-8
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: "zulu"
        java-version: "${{ matrix.java-version }}"
    - uses: sbt/setup-sbt@v1
    - uses: actions/cache@v5
      with:
        path: |
          ~/.ivy2/cache
        key: sbt-ivy-cache-spark-${{ matrix.spark-version}}-java-${{ matrix.java-version }}
    - name: Check scalafmt
      run: sbt -DsparkVersion=${{ matrix.spark-version }} scalafmtCheckAll
    - name: Build and Test
      run: sbt -DsparkVersion=${{ matrix.spark-version }} test
    - name: Run Fuzzy Tests
      run: |
        sbt -DsparkVersion=${{ matrix.spark-version }} \
        fuzzy-testing/runMain io.github.semyonsinchenko.sparkss.fuzzy.FuzzyTestingCli \
        --seed 42 \
        --rows 50000 \
        --out fuzzy-testing/target/reports/fuzzy-report.md
